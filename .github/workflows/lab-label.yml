name: Lab Progress

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  label:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Apply lab-N-complete label
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const branch = pr.head.ref || '';
            const title = pr.title || '';

            let lab = null;
            let reason = '';

            // 1. Claim PRs: claim/lab-N  (Labs 0, 1, 3, 6, 10)
            let m = branch.match(/^claim\/lab-(\d+)$/);
            if (m) {
              lab = parseInt(m[1], 10);
              reason = `claim branch ${branch}`;
            }

            // 2. Feature branches: {type}/lab-N-*  (Labs 2, 4, 8)
            if (lab === null) {
              m = branch.match(/^(?:feat|fix|docs|chore|refactor)\/lab-(\d+)(?:[-\/]|$)/);
              if (m) {
                lab = parseInt(m[1], 10);
                reason = `feature branch ${branch}`;
              }
            }

            // 3. Release Please PRs: release-please--*  (Lab 5)
            if (lab === null && /^release-please--/.test(branch)) {
              lab = 5;
              reason = `release-please branch ${branch}`;
            }

            // 4. Promotion PRs by title pattern (Lab 7 = first dev deploy, Lab 9 = first staging promote)
            if (lab === null) {
              m = title.match(/^chore\((development|staging)\):\s*promote\b/i);
              if (m) {
                lab = m[1].toLowerCase() === 'staging' ? 9 : 7;
                reason = `promotion title "${title}"`;
              }
            }

            if (lab === null) {
              core.info(`No lab pattern matched (branch="${branch}", title="${title}") — skipping.`);
              return;
            }

            if (lab < 0 || lab > 10) {
              core.warning(`Lab number out of range: ${lab} (from ${reason}) — skipping.`);
              return;
            }

            const label = `lab-${lab}-complete`;
            const { owner, repo } = context.repo;

            // Create the label on-demand if it doesn't exist yet.
            let labelExists = true;
            try {
              await github.rest.issues.getLabel({ owner, repo, name: label });
            } catch (err) {
              if (err.status === 404) {
                labelExists = false;
              } else {
                throw err;
              }
            }

            // Label-once guard — each lab's badge is "done or not", not a
            // count. Lab 5's flow, for example, produces two merged PRs
            // that both match different rules (student's feat PR via
            // rule 2, Release Please's PR via rule 3) — without this
            // guard the badge reads "2". Same class of collision applies
            // to every subsequent Release Please PR (would add lab-5)
            // and every extra dev-promotion PR (would add lab-7). First
            // matching PR wins; subsequent matches are skipped.
            if (labelExists) {
              const existing = await github.rest.issues.listForRepo({
                owner,
                repo,
                labels: label,
                state: 'all',
                per_page: 1,
              });
              if (existing.data.length > 0) {
                core.notice(
                  `"${label}" already on PR #${existing.data[0].number} — skipping this PR ` +
                  `(badge is single-state). Rule matched: ${reason}.`
                );
                return;
              }
            } else {
              await github.rest.issues.createLabel({
                owner,
                repo,
                name: label,
                color: '2ea44f',
                description: `Lab ${lab} complete`,
              });
              core.info(`Created label "${label}".`);
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: pr.number,
              labels: [label],
            });

            core.notice(`Applied "${label}" to PR #${pr.number} (${reason}).`);
