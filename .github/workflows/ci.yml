name: Validate

on:
  pull_request:
  push:
    branches:
      - main
    # Skip redundant CI on the push event that lands after a release PR merges —
    # the three files Release Please touches were already gated by the PR run.
    paths-ignore:
      - '.release-please-manifest.json'
      - 'app/CHANGELOG.md'
      - 'app/package.json'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  # Guard the Conventional-Commits contract Release Please reads. GitHub's
  # squash merge defaults the commit message to the PR title, and Release
  # Please parses that on main. A non-matching title is silently dropped
  # from the CHANGELOG — exactly the gotcha Lab 5 warns about. Catch it
  # in CI so students can't merge an unparseable title by accident.
  check-pr-title:
    name: Check PR title
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Validate conventional-commit format
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          regex='^(feat|fix|chore|docs|style|refactor|perf|test|build|ci|revert)(\([^)]+\))?!?: .+'
          if ! printf '%s' "$TITLE" | grep -qE "$regex"; then
            {
              echo "CI CHECK FAILED — PR title doesn't match Conventional Commits."
              echo
              echo "Current title: $TITLE"
              echo
              echo "Expected: <type>(<scope>): <subject>"
              echo "  e.g., feat(resume): add talking point"
              echo "        fix(lab-3): update wizard step text"
              echo "        chore(deps): bump node"
              echo
              echo "Allowed types: feat, fix, chore, docs, style, refactor, perf, test, build, ci, revert"
              echo
              echo "Fix: gh pr edit <number> --title \"feat(scope): subject\""
              echo
              echo "Why: Release Please parses the squash-commit message on main (= your"
              echo "     PR title by default). Non-matching titles vanish from the CHANGELOG."
              echo "     See docs/en/lab-05-first-release-tag.md."
            } >&2
            exit 1
          fi

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      deploy: ${{ steps.filter.outputs.deploy }}
      infra: ${{ steps.filter.outputs.infra }}
      automation: ${{ steps.filter.outputs.automation }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed lanes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            web:
              - 'app/**'
              - '.github/workflows/ci.yml'
              - '.github/workflows/release-assets.yml'
            deploy:
              - 'deploy/**'
              - 'scripts/release_state.py'
              - 'scripts/promotion_wizard.py'
              - '.github/workflows/deploy-static.yml'
              - '.github/workflows/deploy-ecs.yml'
            infra:
              - 'config/project-setup.json'
              - 'infra/cloudformation/**'
              - 'scripts/setup_repo.py'
              - 'docs/en/concepts/infrastructure.md'
            automation:
              - '.github/workflows/**'
              - '.release-please-manifest.json'
              - 'release-please-config.json'

  validate-automation:
    needs: detect-changes
    if: github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.automation == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install actionlint
        shell: bash
        run: |
          version="1.7.8"
          arch="$(uname -m)"
          install_dir="${RUNNER_TEMP}/actionlint-bin"
          case "${arch}" in
            x86_64) arch="amd64" ;;
            aarch64|arm64) arch="arm64" ;;
            *)
              echo "Unsupported architecture: ${arch}" >&2
              exit 1
              ;;
          esac
          mkdir -p "${install_dir}"
          curl -sSL "https://github.com/rhysd/actionlint/releases/download/v${version}/actionlint_${version}_linux_${arch}.tar.gz" | tar -xz -C "${install_dir}" actionlint
          echo "${install_dir}" >> "${GITHUB_PATH}"

      - name: Lint GitHub Actions workflows
        run: actionlint

  validate-web:
    needs: detect-changes
    if: github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify web package metadata
        run: |
          node -e "const pkg = require('./app/package.json'); if (!pkg.version) throw new Error('app/package.json is missing version');"
          test -f app/index.html
          test -f app/src/main.tsx
          test -f app/vite.config.ts
          test -d app/public/architecture

      - name: Install web dependencies
        run: |
          npm ci --prefix app

      - name: Build web app
        run: npm run build --prefix app

      - name: Package built static site
        run: |
          cd app/dist
          zip -qr /tmp/site.zip .

      - name: Build container image
        run: docker build -t resume-cicd-lab-web:validate ./app

  validate-deploy:
    needs: detect-changes
    if: github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy descriptors
        run: python3 scripts/release_state.py validate

  validate-infra:
    needs: detect-changes
    if: github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install wizard dependencies
        run: pip install --user -r scripts/requirements.txt

      - name: Validate central setup config
        run: python3 scripts/setup_repo.py validate-config

  summary:
    needs:
      - check-pr-title
      - detect-changes
      - validate-automation
      - validate-web
      - validate-deploy
      - validate-infra
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check validation results
        run: |
          results=(
            "${{ needs.check-pr-title.result }}"
            "${{ needs.detect-changes.result }}"
            "${{ needs.validate-automation.result }}"
            "${{ needs.validate-web.result }}"
            "${{ needs.validate-deploy.result }}"
            "${{ needs.validate-infra.result }}"
          )
          for result in "${results[@]}"; do
            if [[ "${result}" == "failure" || "${result}" == "cancelled" ]]; then
              echo "A validation lane failed: ${result}" >&2
              exit 1
            fi
          done
