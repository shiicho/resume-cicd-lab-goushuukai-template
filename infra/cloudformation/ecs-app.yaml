AWSTemplateFormatVersion: "2010-09-09"
Description: "Single-environment ECS Fargate stack for the resume web app."

Parameters:
  ProjectName:
    Type: String
    Description: "Project slug used in resource names."
  ResourceProjectName:
    Type: String
    Description: "Short project name used in AWS resource names."
  ResourceIdentifier:
    Type: String
    Description: "Repo or workload identifier appended to AWS resource names."
  ResourceShortIdentifier:
    Type: String
    Description: "Short identifier used for AWS resources with strict name length limits."
  Environment:
    Type: String
    Description: "Environment name."
    AllowedValues:
      - development
      - staging
      - production
  EnvironmentCode:
    Type: String
    Description: "Abbreviated environment code used in AWS resource names."
    AllowedValues:
      - dev
      - stg
      - prd
  VpcCidr:
    Type: String
    Description: "CIDR block for the VPC."
  PublicSubnet1Cidr:
    Type: String
    Description: "CIDR block for the first public subnet."
  PublicSubnet2Cidr:
    Type: String
    Description: "CIDR block for the second public subnet."
  DesiredCount:
    Type: Number
    Description: "Desired ECS task count."
    Default: 1
  Cpu:
    Type: String
    Description: "Task CPU units."
    Default: "256"
  Memory:
    Type: String
    Description: "Task memory in MiB."
    Default: "512"
  ContainerPort:
    Type: Number
    Description: "Application container port."
    Default: 8080
  HealthCheckPath:
    Type: String
    Description: "ALB health check path."
    Default: /
  BootstrapImageUri:
    Type: String
    Description: "Temporary public image used to create the first ECS service."
    Default: "public.ecr.aws/nginx/nginx-unprivileged:stable-alpine"

Resources:
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub "${ResourceProjectName}-${EnvironmentCode}-ec2-vpc-${ResourceIdentifier}"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${ResourceProjectName}-${EnvironmentCode}-ec2-igw-${ResourceIdentifier}"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

  AttachInternetGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref Vpc

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: !Ref PublicSubnet1Cidr
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${ResourceProjectName}-${EnvironmentCode}-ec2-subnet-public-a-${ResourceIdentifier}"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [1, !GetAZs ""]
      CidrBlock: !Ref PublicSubnet2Cidr
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${ResourceProjectName}-${EnvironmentCode}-ec2-subnet-public-c-${ResourceIdentifier}"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "${ResourceProjectName}-${EnvironmentCode}-ec2-rt-public-${ResourceIdentifier}"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachInternetGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: "0.0.0.0/0"
      GatewayId: !Ref InternetGateway

  PublicSubnet1Association:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet1

  PublicSubnet2Association:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet2

  LoadBalancerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "ALB security group for ${ProjectName}-${Environment}"
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: "0.0.0.0/0"
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: "0.0.0.0/0"
      Tags:
        - Key: Name
          Value: !Sub "${ResourceProjectName}-${EnvironmentCode}-ec2-sg-alb-${ResourceIdentifier}"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

  ServiceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "ECS service security group for ${ProjectName}-${Environment}"
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref ContainerPort
          ToPort: !Ref ContainerPort
          SourceSecurityGroupId: !Ref LoadBalancerSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: "0.0.0.0/0"
      Tags:
        - Key: Name
          Value: !Sub "${ResourceProjectName}-${EnvironmentCode}-ec2-sg-service-${ResourceIdentifier}"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${ResourceProjectName}-${EnvironmentCode}-ecs-cluster-${ResourceIdentifier}"
      Tags:
        - Key: Name
          Value: !Sub "${ResourceProjectName}-${EnvironmentCode}-ecs-cluster-${ResourceIdentifier}"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/ecs/${ResourceProjectName}-${EnvironmentCode}-logs-web-${ResourceIdentifier}"
      RetentionInDays: 14

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ResourceProjectName}-${EnvironmentCode}-iam-ecs-task-exec-${ResourceIdentifier}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: "sts:AssumeRole"
      ManagedPolicyArns:
        - "arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy"
      Tags:
        - Key: Name
          Value: !Sub "${ResourceProjectName}-${EnvironmentCode}-iam-ecs-task-exec-${ResourceIdentifier}"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ResourceProjectName}-${EnvironmentCode}-iam-ecs-task-app-${ResourceIdentifier}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: "sts:AssumeRole"
      Tags:
        - Key: Name
          Value: !Sub "${ResourceProjectName}-${EnvironmentCode}-iam-ecs-task-app-${ResourceIdentifier}"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${ResourceProjectName}-${EnvironmentCode}-elb-${ResourceShortIdentifier}"
      Scheme: internet-facing
      Type: application
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref LoadBalancerSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub "${ResourceProjectName}-${EnvironmentCode}-elb-${ResourceShortIdentifier}"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${ResourceProjectName}-${EnvironmentCode}-elb-tg-${ResourceShortIdentifier}"
      Port: !Ref ContainerPort
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref Vpc
      HealthCheckEnabled: true
      HealthCheckPath: !Ref HealthCheckPath
      HealthCheckProtocol: HTTP
      Matcher:
        HttpCode: "200-399"
      Tags:
        - Key: Name
          Value: !Sub "${ResourceProjectName}-${EnvironmentCode}-elb-tg-${ResourceShortIdentifier}"
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

  Listener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  BootstrapTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${ResourceProjectName}-${EnvironmentCode}-ecs-task-${ResourceIdentifier}"
      Cpu: !Ref Cpu
      Memory: !Ref Memory
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: web
          Image: !Ref BootstrapImageUri
          Essential: true
          PortMappings:
            - ContainerPort: !Ref ContainerPort
              HostPort: !Ref ContainerPort
              Protocol: tcp
          Environment:
            - Name: APP_ENV
              Value: !Ref Environment
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  Service:
    Type: AWS::ECS::Service
    DependsOn: Listener
    Properties:
      Cluster: !Ref Cluster
      ServiceName: !Sub "${ResourceProjectName}-${EnvironmentCode}-ecs-service-${ResourceIdentifier}"
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      TaskDefinition: !Ref BootstrapTaskDefinition
      HealthCheckGracePeriodSeconds: 60
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups:
            - !Ref ServiceSecurityGroup
          Subnets:
            - !Ref PublicSubnet1
            - !Ref PublicSubnet2
      LoadBalancers:
        - ContainerName: web
          ContainerPort: !Ref ContainerPort
          TargetGroupArn: !Ref TargetGroup

Outputs:
  ClusterName:
    Description: "ECS cluster name."
    Value: !Sub "${ResourceProjectName}-${EnvironmentCode}-ecs-cluster-${ResourceIdentifier}"
  ServiceName:
    Description: "ECS service name."
    Value: !Sub "${ResourceProjectName}-${EnvironmentCode}-ecs-service-${ResourceIdentifier}"
  LoadBalancerDnsName:
    Description: "ALB DNS name."
    Value: !GetAtt LoadBalancer.DNSName
  ServiceUrl:
    Description: "Public URL of the ECS service."
    Value: !Sub "http://${LoadBalancer.DNSName}"
  TaskExecutionRoleArn:
    Description: "IAM role ARN used by ECS for image pull and logging."
    Value: !GetAtt TaskExecutionRole.Arn
  TaskRoleArn:
    Description: "IAM role ARN attached to the running application task."
    Value: !GetAtt TaskRole.Arn
  LogGroupName:
    Description: "CloudWatch Logs group used by the app."
    Value: !Ref LogGroup
  TaskFamily:
    Description: "Task definition family name."
    Value: !Sub "${ResourceProjectName}-${EnvironmentCode}-ecs-task-${ResourceIdentifier}"
